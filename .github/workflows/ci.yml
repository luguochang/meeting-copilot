name: CI

on:
  push:
    branches: [main, "phase-0-engineering-baseline"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (web_mvp + core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: code/web_mvp/backend/uv.lock
      - name: Sync locked backend environment
        working-directory: code/web_mvp/backend
        run: |
          uv lock --check
          uv sync --frozen --group dev
      - name: web_mvp tests
        working-directory: code/web_mvp/backend
        run: uv run --frozen pytest -q
      - name: core tests
        working-directory: code/web_mvp/backend
        run: uv run --frozen pytest -q ../../core

  mainline-tests:
    name: Mainline + workbench + approach tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: code/web_mvp/backend/uv.lock
      - name: Sync locked backend environment
        working-directory: code/web_mvp/backend
        run: |
          uv lock --check
          uv sync --frozen --group dev
      - name: mainline + frontend + approach + stream + llm tests
        working-directory: code/web_mvp/backend
        run: uv run --frozen pytest tests/test_e2e_mainline.py tests/test_workbench.py tests/test_approach_cards.py tests/test_asr_stream.py tests/test_llm_service.py -q

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: code/web_mvp/backend/uv.lock
      - name: Sync locked backend environment
        working-directory: code/web_mvp/backend
        run: |
          uv lock --check
          uv sync --frozen --group dev
      - name: Ruff lint
        working-directory: code/web_mvp/backend
        run: uv run --frozen ruff check meeting_copilot_web_mvp/

  workbench-smoke:
    name: Workbench UI smoke (Chrome)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: code/web_mvp/backend/uv.lock
      - name: Sync locked backend environment
        working-directory: code/web_mvp/backend
        run: |
          uv lock --check
          uv sync --frozen --group dev
      - name: Run browser smoke with locked backend
        working-directory: code/web_mvp/backend
        run: uv run --frozen node ../../e2e/workbench_smoke.mjs

  rust-check:
    name: Tauri desktop cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check
        run: cargo check --locked --manifest-path code/desktop_tauri/src-tauri/Cargo.toml
